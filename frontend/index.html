<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Gestor de empresas</title>
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <header>Gestiona tu Empresa</header>
        <div class="container">
            <div class="card">
                <h2>Clientes</h2>

                <input id="nombre" placeholder="Nombre">
                <input id="email" placeholder="Email">
                <input id="telefono" placeholder="Teléfono">
                <br><br>

                <button onClick="crearCliente()">Crear</button>
                <button class="btn-secondary" onClick="cargarClientes()">Cargar</button>
                <br><br>

                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Email</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="listadoClientes"></tbody>
                </table>
            </div>
            <p id="mensaje"></p>

            <div class="card">
                <h2>Productos</h2>
                <button onClick="cargarProductos()">Cargar Productos</button>
                <br><br>

                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Precio</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="listadoProductos"></tbody>
                </table>
            </div>
            <p id="mensaje"></p>

            <div class="card">
                <h2>Reportes</h2>
                <button onClick="cargarReporteVentas()">Reporte de Ventas</button>
                <button onclick="cargarReporteVentas()">JOIN + GROUP BY</button>
                <button onclick="cargarSubquery()">Subquery</button>
                <button onclick="cargarCTE()">CTE</button>
                <button onclick="cargarVista()">VIEW</button>
                <br><br>
                <table>
                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Cantidad Vendida</th>
                        </tr>
                    </thead>
                    <tbody id="listadoReporte"></tbody>
                </table>

                <h2>Crear Nueva Venta</h2>
                <h3>Cliente</h3>
                <select id="clienteVenta"></select>
                <br><br>

                <table border="1">
                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Cantidad</th>
                            <th>Precio</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="tablaVenta"></tbody>
                </table>
            <br>
            <button onclick="agregarFila()">+ Agregar fila</button>
            <button onclick="guardarVenta()">Guardar Venta</button>
            </div>
            <p id="mensaje"></p>
        </div>

        <script>
            const API = "http://localhost:3000";
            function msg(t){
                document.getElementById("mensaje").innerText = t;
            }

            async function crearCliente(){
                try{
                    const nombre = document.getElementById("nombre").value;

                    if(!nombre) return msg("Debe indicar nombre");

                    await fetch(API + "/clientes", {
                    method:"POST",
                    headers:{"Content-Type":"application/json"},
                    body:JSON.stringify({
                        nombre,
                        email: document.getElementById("email").value,
                        telefono: document.getElementById("telefono").value
                    })
                    });

                    msg("Cliente creado");
                    cargarClientes();
                }catch{
                    msg("Error al crear cliente");
                }
            }

            async function cargarClientesActivos(){
                const res = await fetch(API + "/reporte-subquery");
                const data = await res.json();

                const tbody = document.getElementById("listadoReporte");
                tbody.innerHTML = "";

                data.forEach(r=>{
                    tbody.innerHTML += `
                    <tr>
                        <td>${r.nombre}</td>
                        <td>-</td>
                    </tr>
                    `;
                });
            }

            async function eliminarCliente(id){
                await fetch(API + "/clientes/" + id, {method:"DELETE"});
                cargarClientes();
            }

            async function editarCliente(id){
                const nombre = prompt("Nuevo nombre:");
                const email = prompt("Nuevo email:");
                const telefono = prompt("Nuevo teléfono:");

                if(!nombre || !email || !telefono) return;

                await fetch(API + "/clientes/" + id,{
                    method:"PUT",
                    headers:{"Content-Type":"application/json"},
                    body:JSON.stringify({nombre, email, telefono})
                });
                cargarClientes();
            }

            async function crearProducto(){
                const nombre = document.getElementById("nombreProducto").value;
                const precio = document.getElementById("precioProducto").value;

                if(!nombre || !precio) return msg("Datos incompletos");

                await fetch(API + "/productos",{
                    method:"POST",
                    headers:{"Content-Type":"application/json"},
                    body:JSON.stringify({nombre, precio})
                });
                cargarProductos();
            }

            async function cargarProductos(){
                const res = await fetch(API + "/productos");
                const data = await res.json();

                const tbody = document.getElementById("listadoProductos");
                tbody.innerHTML = "";

                data.forEach(p=>{
                    tbody.innerHTML += `
                    <tr>
                        <td>${p.id_prod}</td>
                        <td>${p.nombre}</td>
                        <td>${p.precio}</td>
                        <td>-</td>
                    </tr>
                    `;
                });
            }

            async function cargarReporteVentas(){
                const res = await fetch(API + "/reporte-ventas");
                const data = await res.json();

                renderTabla(
                    ["ID Venta","Fecha","Cliente","Producto","Cantidad","Precio"],
                    data.map(r=>[
                        r.id_ven,
                        new Date(r.fecha).toLocaleDateString(),
                        r.cliente,
                        r.producto,
                        r.cantidad,
                        r.precio_unit
                    ])
                );
            }

            async function cargarCTE(){
                const res = await fetch(API + "/reporte-cte");
                const data = await res.json();

                renderTabla(["Cliente","Total"], data.map(r=>[r.nombre, r.total]));
            }

            async function cargarSubquery(){
                const res = await fetch(API + "/reporte-subquery");
                const data = await res.json();

                renderTabla(["Cliente","Total de Compras"], data.map(r=>[r.nombre, r.total_ventas || 0]));
            }

            async function cargarVista(){
                const res = await fetch(API + "/vista-ventas");
                const data = await res.json();

                renderTabla(["Venta","Cliente"], data.map(r=>[r.id_ven, r.cliente]));
            }

            async function crearVenta(){
                try{
                    const res = await fetch(API + "/venta", {method:"POST"});
                    const data = await res.json();

                    msg("Venta creada ID: " + data.idVenta);
                }catch{
                    msg("Error en la transacción");
                }
            }

            async function guardarVenta(){
                const filas = document.querySelectorAll("#tablaVenta tr");

                if(filas.length === 0){
                    return msg("Agrega al menos un producto");
                }

                const detalles = [];

                filas.forEach(fila=>{
                    const id_prod = fila.querySelector("select").value;
                    const cantidad = fila.querySelectorAll("input")[0].value;
                    const precio = fila.querySelectorAll("input")[1].value;

                    detalles.push({ id_prod, cantidad, precio });
                });

                const id_clien = document.getElementById("clienteVenta").value;

                const res = await fetch(API + "/venta", {
                    method:"POST",
                    headers:{"Content-Type":"application/json"},
                    body:JSON.stringify({ detalles, id_clien })
                });

                await cargarReporteVentas();
                await cargarSubquery();
                await cargarCTE();
                const data = await res.json();
                msg("Venta creada ID: " + data.idVenta);
            }

            function renderTabla(headers, rows){
                const table = document.querySelector("#listadoReporte").closest("table");

                const thead = table.querySelector("thead");
                thead.innerHTML = "<tr>" + headers.map(h => `<th>${h}</th>`).join("") + "</tr>";

                const tbody = table.querySelector("#listadoReporte");
                tbody.innerHTML = "";

                rows.forEach(row=>{
                    let tr = "<tr>";
                    row.forEach(col=>{
                        tr += `<td>${col}</td>`;
                    });
                    tr += "</tr>";
                    tbody.innerHTML += tr;
                });
            }

            let clientes = [];

            async function cargarClientesSelect(){
                const res = await fetch(API + "/clientes");
                clientes = await res.json();

                const select = document.getElementById("clienteVenta");

                select.innerHTML = clientes.map(c =>
                    `<option value="${c.id_clien}">${c.nombre}</option>`
                ).join("");
            }

            let productos = [];

            async function cargarProductosSelect(){
                const res = await fetch(API + "/productos");
                productos = await res.json();
            }

            function agregarFila(){
                const tbody = document.getElementById("tablaVenta");

                const opciones = productos.map(p =>
                    `<option value="${p.id_prod}" data-precio="${p.precio}">
                        ${p.nombre}
                    </option>`
                ).join("");

                const fila = document.createElement("tr");

                fila.innerHTML = `
                    <td>
                        <select onchange="actualizarPrecio(this)">
                            ${opciones}
                        </select>
                    </td>
                    <td><input type="number" value="1"></td>
                    <td><input type="number" class="precio"></td>
                    <td><button onclick="this.parentElement.parentElement.remove()">X</button></td>
                `;

                tbody.appendChild(fila);
            }

            function actualizarPrecio(select){
                const precio = select.selectedOptions[0].dataset.precio;
                select.parentElement.parentElement.querySelector(".precio").value = precio;
            }

            async function cargarClientes(){
                const res = await fetch(API + "/clientes");
                const data = await res.json();

                const tbody = document.getElementById("listadoClientes");
                tbody.innerHTML = "";

                data.forEach(c=>{
                    tbody.innerHTML += `
                    <tr>
                        <td>${c.id_clien}</td>
                        <td>${c.nombre}</td>
                        <td>${c.email || ""}</td>
                        <td>
                            <button onclick="editarCliente(${c.id_clien})">Editar</button>
                            <button onclick="eliminarCliente(${c.id_clien})">Eliminar</button>
                        </td>
                    </tr>
                    `;
                });
            }

            window.onload = async () => {
                await cargarProductosSelect();
                await cargarClientesSelect();
                agregarFila();
            };
        </script>
    </body>
</html>
