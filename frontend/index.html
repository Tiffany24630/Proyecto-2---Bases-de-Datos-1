<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Gestor de empresas</title>
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <header>Gestiona tu Empresa</header>
        <div class="container">
            <div class="card">
                <h2>Clientes</h2>

                <input id="nombre" placeholder="Nombre">
                <input id="email" placeholder="Email">
                <input id="telefono" placeholder="Teléfono">
                <br><br>

                <button onClick="crearCliente()">Crear</button>
                <button class="btn-secondary" onClick="cargarClientes()">Cargar</button>
                <br><br>

                <table>
                    <thread>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Email</th>
                            <th>Acciones</th>
                        </tr>
                    </thread>
                    <tbody id="listadoClientes"></tbody>
                </table>
            </div>

            <div class="card">
                <h2>Productos</h2>
                <input id="nombreProducto" placeholder="Nombre">
                <input id="precioProducto" placeholder="Precio">
                <br><br>

                <button onClick="crearProducto()">Crear</button>
                <button class="btn-secondary" onClick="cargarProductos()">Cargar</button>
                <br><br>

                <table>
                    <thread>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Precio</th>
                            <th>Acciones</th>
                        </tr>
                    </thread>
                    <tbody id="listadoProductos"></tbody>
                </table>
            </div>

            <div class="card">
                <h2>Reportes</h2>
                <button onClick="cargarReporteVentas()">Reporte de Ventas</button>
                <br><br>
                <table>
                    <thread>
                        <tr>
                            <th>Producto</th>
                            <th>Cantidad Vendida</th>
                        </tr>
                    </thread>
                    <tbody id="listadoReporte"></tbody>
                </table>
            </div>
            <p id="mensaje"></p>
        </div>

        <script>
            const API = "http://localhost:3000";
            function msg(t){
                document.getElementById("mensaje").innerText = t;
            }

            async function crearCliente(){
                try{
                    const nombre = document.getElementById("nombre").value;

                    if(!nombre){
                        return msg("Debe indicar nombre");
                    }

                    await fetch(API + "/clientes", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            nombre,
                            email: document.getElementById("email").value,
                            telefono: document.getElementById("telefono").value
                        })
                    });

                    mostrarError("Cliente creado correctamente")
                    cargarClientes();
                }catch(error){
                    mostrarError("Error al crear cliente.");
                }
            }

            async function cargarClientes(){
                try{
                    const res = await fetch(API + "/clientes");
                    const data =await res.json();
                    const listado = document.getElementById("listadoClientes");
                    listado.innerHTML = "";

                    data.forEach(c=>{
                        const li = document.createElement("li");
                        li.innerHTML = `${c.nombre}
                        <button onclick="eliminarCliente(${c.id_cliente})">Eliminar</button>
                        <button onclick="editarCliente(${c.id_cliente})">Editar</button>
                        `;
                        listado.appendChild(li);
                    });
                }catch(error){
                    mostrarError("Error al cargar clientes.");
                }
            }

            async function editarCliente(id){
                const nuevo = prompt("Nuevo nombre:");

                if(!nuevo){return;}

                await fetch(API + "/clientes/" + id, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({nombre: nuevo})
                });
                cargarClientes();
            }
        </script>
    </body>
</html>
